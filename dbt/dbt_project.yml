name: cab_pipeline
version: "1.0.0"
config-version: 2

profile: cab_pipeline

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  cab_pipeline:
    staging:
      +materialized: view
      +schema: staging

    silver:
      +materialized: incremental
      +schema: silver
      +on_schema_change: fail
