nyc_taxi:
  target: docker
  outputs:
    docker:
      type: postgres
      host: pipeline_db
      port: 5432
      user: "{{ env_var('PIPELINE_DB_USER') }}"
      password: "{{ env_var('PIPELINE_DB_PASSWORD') }}"
      dbname: "{{ env_var('PIPELINE_DB_NAME') }}"
      schema: public
      threads: 4
